<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Field Position Editor — Fastweb Energia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1d2e; color: #e0e4f0; min-height: 100vh; }

  /* ── Top bar ── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: #12141f; border-bottom: 1px solid #2a2d42;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  #topbar h1 { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }
  .tb-sep { width: 1px; height: 20px; background: #2a2d42; flex-shrink: 0; }
  #topbar select, #topbar button {
    font-family: inherit; font-size: 12px; border-radius: 7px; border: 1px solid #2e3250;
    padding: 5px 10px; background: #1e2138; color: #c8cce8; cursor: pointer;
  }
  #topbar button { font-weight: 600; }
  #topbar button:hover { background: #2a2e50; }
  #btn-copy { background: #1a4a8a; color: #fff; border-color: #2255bb; }
  #btn-copy:hover { background: #2255bb; }
  #btn-reset { background: #5a1a1a; color: #ffaaaa; border-color: #992222; }
  #status { font-size: 11px; color: #7a8099; margin-left: auto; }

  /* ── Layout ── */
  #main { display: flex; height: calc(100vh - 52px); overflow: hidden; }

  /* ── Canvas area ── */
  #canvas-wrap {
    flex: 1; overflow: auto; position: relative;
    background: #0d0f1a;
    display: flex; justify-content: center; align-items: flex-start; padding: 20px;
  }
  #pdf-container { position: relative; display: inline-block; }
  #pdf-canvas { display: block; box-shadow: 0 8px 40px rgba(0,0,0,.7); }

  /* ── Field pins ── */
  .field-pin {
    position: absolute;
    cursor: grab;
    user-select: none;
    z-index: 10;
    transform: translate(-50%, 50%); /* anchor bottom-center = text baseline */
  }
  .field-pin:active { cursor: grabbing; }
  .pin-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid #fff;
    position: absolute;
    left: 50%; top: 50%; transform: translate(-50%, -50%);
  }
  .pin-label {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 12px;
    background: rgba(10,12,25,0.88);
    color: #fff; font-size: 9px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px; white-space: nowrap;
    pointer-events: none; border: 1px solid rgba(255,255,255,0.15);
  }
  .field-pin.selected .pin-dot { box-shadow: 0 0 0 3px rgba(255,255,255,0.5); }
  .field-pin .pin-crossh {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 1px; background: rgba(255,255,255,0.6);
  }
  .field-pin .pin-crossv {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    height: 18px; width: 1px; background: rgba(255,255,255,0.6);
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 320px; flex-shrink: 0; background: #12141f;
    border-left: 1px solid #2a2d42; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  #sidebar-head {
    padding: 12px 14px; border-bottom: 1px solid #2a2d42;
    font-size: 12px; font-weight: 700; color: #8a8fb0;
    text-transform: uppercase; letter-spacing: .07em;
  }
  .field-row {
    padding: 7px 14px; border-bottom: 1px solid #1e2138;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    transition: background .12s;
  }
  .field-row:hover { background: #1e2138; }
  .field-row.active { background: #1e2545; }
  .fr-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .fr-name { font-size: 11.5px; font-weight: 600; color: #c8cce8; flex: 1; }
  .fr-coords { font-size: 10px; color: #5a6080; font-family: monospace; white-space: nowrap; }

  /* ── Detail panel ── */
  #detail {
    padding: 14px; border-top: 1px solid #2a2d42; margin-top: auto;
    background: #0d0f1a;
  }
  #detail h3 { font-size: 12px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .det-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .det-label { font-size: 10px; color: #7a8099; width: 24px; }
  .det-input {
    flex: 1; background: #1e2138; border: 1px solid #2e3250; border-radius: 6px;
    color: #c8cce8; font-size: 12px; font-family: monospace;
    padding: 4px 8px; outline: none;
  }
  .det-input:focus { border-color: #4466cc; }
  #code-out {
    margin-top: 10px; background: #070810; border: 1px solid #2a2d42;
    border-radius: 8px; padding: 10px; font-family: monospace; font-size: 10px;
    color: #7a9ee0; line-height: 1.6; max-height: 200px; overflow-y: auto;
    white-space: pre;
  }
</style>
</head>

// ─── State ───
let currentPdf  = "preventivo";
let pdfPageH    = 841.89; // A4 default
let scale       = 1.5;
let selectedKey = null;
let positions   = {};   // overrides: { key: {x, top} }

function getPos(key) {
  const f = FIELDS[currentPdf].find(f => f.key === key);
  return positions[currentPdf + "." + key] || { x: f.x, top: f.top };
}
function setPos(key, x, top) {
  positions[currentPdf + "." + key] = { x: Math.round(x), top: Math.round(top) };
}

// ─── PDF rendering ───
let pdfDoc = null;
let pdfRendering = false;

const PDFS = {
  preventivo: "Modulo_energia_preventivo.pdf",
  multisito:  "Modulo_energia_multisito.pdf",
};

async function loadPDF(type) {
  const url = PDFS[type];
  document.getElementById("status").textContent = "Caricamento PDF...";
  try {
    pdfDoc = await pdfjsLib.getDocument(url).promise;
    await renderPage();
  } catch(e) {
    document.getElementById("status").textContent = "⚠ PDF non trovato — serve servire i file da un web server. Vedi istruzioni sotto.";
    showFallback(type);
  }
}

async function renderPage() {
  if (!pdfDoc) return;
  const page = await pdfDoc.getPage(1);
  const vp   = page.getViewport({ scale });
  pdfPageH   = page.getViewport({ scale: 1 }).height; // unscaled height

  const canvas = document.getElementById("pdf-canvas");
  canvas.width  = vp.width;
  canvas.height = vp.height;
  const ctx = canvas.getContext("2d");
  await page.render({ canvasContext: ctx, viewport: vp }).promise;

  document.getElementById("status").textContent = `PDF caricato — ${FIELDS[currentPdf].length} campi | trascina i pin`;
  rebuildPins();
}

function showFallback(type) {
  const canvas = document.getElementById("pdf-canvas");
  canvas.width  = Math.round(595 * scale);
  canvas.height = Math.round(841 * scale);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#f5f5f5";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#999";
  ctx.font = "14px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("⚠ PDF non caricabile in modalità file://", canvas.width/2, canvas.height/2 - 30);
  ctx.fillText("Avvia un server locale:", canvas.width/2, canvas.height/2);
  ctx.font = "12px monospace";
  ctx.fillStyle = "#555";
  ctx.fillText("python3 -m http.server 8000", canvas.width/2, canvas.height/2 + 30);
  ctx.fillText("oppure: npx serve .", canvas.width/2, canvas.height/2 + 50);
  ctx.textAlign = "left";
  pdfPageH = 841.89;
  rebuildPins();
}

// ─── Pin system ───
function pdfTopToCanvasY(top) {
  // pdf-lib: y = height - top  (bottom-origin)
  // canvas: y from top
  // So canvas_y = top * scale
  return top * scale;
}
function pdfXToCanvasX(x) {
  return x * scale;
}
function canvasXToPdfX(cx) { return cx / scale; }
function canvasYToPdfTop(cy) { return cy / scale; }

function rebuildPins() {
  // Remove old pins
  document.querySelectorAll(".field-pin").forEach(p => p.remove());
  const container = document.getElementById("pdf-container");

  FIELDS[currentPdf].forEach(f => {
    const pos = getPos(f.key);
    const pin = document.createElement("div");
    pin.className = "field-pin" + (f.key === selectedKey ? " selected" : "");
    pin.id = "pin-" + f.key;
    pin.dataset.key = f.key;

    // Position
    pin.style.left = pdfXToCanvasX(pos.x) + "px";
    pin.style.top  = pdfTopToCanvasY(pos.top) + "px";

    pin.innerHTML = `
      <div class="pin-crossh"></div>
      <div class="pin-crossv"></div>
      <div class="pin-dot" style="background:${f.color}"></div>
      <div class="pin-label" style="color:${f.color}">${f.label}</div>
    `;

    makeDraggable(pin, f.key);
    pin.addEventListener("click", e => { e.stopPropagation(); selectField(f.key); });
    container.appendChild(pin);
  });

  buildSidebar();
}

function makeDraggable(el, key) {
  let startX, startY, startLeft, startTop;
  el.addEventListener("mousedown", e => {
    e.preventDefault();
    selectField(key);
    startX = e.clientX;
    startY = e.clientY;
    startLeft = parseFloat(el.style.left);
    startTop  = parseFloat(el.style.top);

    function onMove(e) {
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const newLeft = Math.max(0, startLeft + dx);
      const newTop  = Math.max(0, startTop  + dy);
      el.style.left = newLeft + "px";
      el.style.top  = newTop  + "px";
      const pdfX   = Math.round(canvasXToPdfX(newLeft));
      const pdfTop = Math.round(canvasYToPdfTop(newTop));
      setPos(key, pdfX, pdfTop);
      updateDetail(key);
      updateSidebarRow(key);
    }
    function onUp() {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    }
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}

function selectField(key) {
  selectedKey = key;
  document.querySelectorAll(".field-pin").forEach(p => p.classList.remove("selected"));
  const pin = document.getElementById("pin-" + key);
  if (pin) pin.classList.add("selected");
  document.querySelectorAll(".field-row").forEach(r => r.classList.remove("active"));
  const row = document.querySelector(`.field-row[data-key="${key}"]`);
  if (row) { row.classList.add("active"); row.scrollIntoView({ block:"nearest" }); }
  updateDetail(key);
}

function updateDetail(key) {
  const f   = FIELDS[currentPdf].find(f => f.key === key);
  const pos = getPos(key);
  const det = document.getElementById("detail");
  det.style.display = "block";
  document.getElementById("det-title").textContent = f.label;
  document.getElementById("inp-x").value = pos.x;
  document.getElementById("inp-y").value = pos.top;
  document.getElementById("code-out").textContent = generateCode(key);
}

function generateCode(key) {
  const f   = FIELDS[currentPdf].find(f => f.key === key);
  const pos = getPos(key);
  if (f.type === "check")
    return `CK(condition, ${pos.x}, ${pos.top});`;
  if (f.type === "cells")
    return `CL(d.${f.key}, ${pos.x}, ${pos.top}, cw, n);`;
  return `T(d.${f.key}, ${pos.x}, ${pos.top}, SZ);`;
}

function updateSidebarRow(key) {
  const pos = getPos(key);
  const row = document.querySelector(`.field-row[data-key="${key}"] .fr-coords`);
  if (row) row.textContent = `x:${pos.x} top:${pos.top}`;
}

function buildSidebar() {
  const list = document.getElementById("field-list");
  list.innerHTML = "";
  FIELDS[currentPdf].forEach(f => {
    const pos = getPos(f.key);
    const row = document.createElement("div");
    row.className = "field-row" + (f.key === selectedKey ? " active" : "");
    row.dataset.key = f.key;
    row.innerHTML = `
      <div class="fr-dot" style="background:${f.color}"></div>
      <div class="fr-name">${f.label}</div>
      <div class="fr-coords">x:${pos.x} top:${pos.top}</div>
    `;
    row.addEventListener("click", () => {
      selectField(f.key);
      // Scroll canvas to pin
      const pin = document.getElementById("pin-" + f.key);
      if (pin) pin.scrollIntoView({ block:"center", behavior:"smooth" });
    });
    list.appendChild(row);
  });
}

// ─── Manual coord inputs ───
document.getElementById("inp-x").addEventListener("input", e => {
  if (!selectedKey) return;
  const x = parseFloat(e.target.value);
  const pos = getPos(selectedKey);
  setPos(selectedKey, x, pos.top);
  const pin = document.getElementById("pin-" + selectedKey);
  if (pin) pin.style.left = pdfXToCanvasX(x) + "px";
  document.getElementById("code-out").textContent = generateCode(selectedKey);
  updateSidebarRow(selectedKey);
});
document.getElementById("inp-y").addEventListener("input", e => {
  if (!selectedKey) return;
  const top = parseFloat(e.target.value);
  const pos = getPos(selectedKey);
  setPos(selectedKey, pos.x, top);
  const pin = document.getElementById("pin-" + selectedKey);
  if (pin) pin.style.top = pdfTopToCanvasY(top) + "px";
  document.getElementById("code-out").textContent = generateCode(selectedKey);
  updateSidebarRow(selectedKey);
});

// ─── Copy all JS code ───
document.getElementById("btn-copy").addEventListener("click", () => {
  const lines = [
    `// ── Coordinate aggiornate — ${currentPdf} ──`,
    `// Copia queste righe in _fill${currentPdf === "preventivo" ? "Preventivo" : "Multisito"}()`,
    ""
  ];
  FIELDS[currentPdf].forEach(f => {
    const pos = getPos(f.key);
    lines.push(`// ${f.label}`);
    lines.push(generateCode(f.key));
  });
  navigator.clipboard.writeText(lines.join("\n")).then(() => {
    const btn = document.getElementById("btn-copy");
    btn.textContent = "✅ Copiato!";
    setTimeout(() => btn.textContent = "📋 Copia codice JS", 2000);
  });
});

// ─── Reset ───
document.getElementById("btn-reset").addEventListener("click", () => {
  if (!confirm("Reset tutte le posizioni a quelle originali del codice?")) return;
  FIELDS[currentPdf].forEach(f => {
    delete positions[currentPdf + "." + f.key];
  });
  rebuildPins();
  document.getElementById("detail").style.display = "none";
  selectedKey = null;
});

// ─── PDF switcher ───
document.getElementById("sel-pdf").addEventListener("change", async e => {
  currentPdf  = e.target.value;
  selectedKey = null;
  document.getElementById("detail").style.display = "none";
  await loadPDF(currentPdf);
});

// ─── Zoom ───
document.getElementById("sel-zoom").addEventListener("change", async e => {
  scale = parseFloat(e.target.value);
  if (pdfDoc) await renderPage();
  else rebuildPins();
});

// ─── Init ───
loadPDF(currentPdf);
</script>
