<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Field Position Editor — Fastweb Energia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1d2e; color: #e0e4f0; min-height: 100vh; }

#topbar {
  position: sticky; top: 0; z-index: 100;
  background: #12141f; border-bottom: 1px solid #2a2d42;
  padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
#topbar h1 { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; }
.tb-sep { width: 1px; height: 20px; background: #2a2d42; flex-shrink: 0; }
#topbar select, #topbar button {
  font-family: inherit; font-size: 11.5px; border-radius: 7px; border: 1px solid #2e3250;
  padding: 5px 10px; background: #1e2138; color: #c8cce8; cursor: pointer;
}
#topbar button:hover { background: #2a2e50; }
#btn-copy   { background: #1a4a8a; color: #fff; border-color: #2255bb; font-weight: 600; }
#btn-copy:hover { background: #2255bb; }
#btn-reset  { background: #5a1a1a; color: #ffaaaa; border-color: #992222; }
#btn-export { background: #1a5a2a; color: #aaffaa; border-color: #22992a; }
#btn-export:hover { background: #22992a; color: #fff; }
#status { font-size: 11px; color: #7a8099; margin-left: auto; white-space: nowrap; }

#main { display: flex; height: calc(100vh - 50px); overflow: hidden; }

#canvas-wrap {
  flex: 1; overflow: auto; background: #0d0f1a;
  display: flex; justify-content: center; align-items: flex-start; padding: 20px;
}
#pdf-container { position: relative; display: inline-block; cursor: crosshair; }
#pdf-canvas { display: block; box-shadow: 0 8px 40px rgba(0,0,0,.7); }

.field-pin {
  position: absolute; cursor: grab; user-select: none; z-index: 10;
  transform: translate(-50%, -50%);
}
.field-pin:active { cursor: grabbing; }
.pin-dot {
  width: 11px; height: 11px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.85);
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  transition: transform .12s;
}
.field-pin:hover .pin-dot { transform: translate(-50%,-50%) scale(1.4); }
.field-pin.selected .pin-dot { box-shadow: 0 0 0 3px rgba(255,255,255,.45); transform: translate(-50%,-50%) scale(1.2); }
.pin-label {
  position: absolute; left: 50%; transform: translateX(-50%);
  bottom: 13px; background: rgba(8,10,22,.92);
  color: #fff; font-size: 9px; font-weight: 700;
  padding: 2px 5px; border-radius: 4px; white-space: nowrap;
  pointer-events: none; border: 1px solid rgba(255,255,255,.12);
}
.pin-crossh { position: absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:20px; height:1px; background:rgba(255,255,255,.5); }
.pin-crossv { position: absolute; left:50%; top:50%; transform:translate(-50%,-50%); height:20px; width:1px; background:rgba(255,255,255,.5); }

#sidebar {
  width: 300px; flex-shrink: 0; background: #12141f;
  border-left: 1px solid #2a2d42; display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-tabs { display: flex; border-bottom: 1px solid #2a2d42; }
.stab {
  flex: 1; padding: 9px; font-size: 11px; font-weight: 700; color: #5a6080;
  cursor: pointer; text-align: center; border: none; background: none;
  font-family: inherit; border-bottom: 2px solid transparent; transition: all .15s;
}
.stab.active { color: #c8cce8; border-bottom-color: #4466cc; }
.stab:hover:not(.active) { color: #9090b0; }

#tab-fields, #tab-add { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#tab-fields.active, #tab-add.active { display: flex; }

#field-search {
  margin: 8px; padding: 6px 10px; background: #1e2138;
  border: 1px solid #2e3250; border-radius: 7px;
  color: #c8cce8; font-size: 11.5px; font-family: inherit; outline: none;
}
#field-search:focus { border-color: #4466cc; }

#field-list { flex: 1; overflow-y: auto; }
.field-row {
  padding: 6px 12px; border-bottom: 1px solid #1a1d30;
  display: flex; align-items: center; gap: 7px; cursor: pointer; transition: background .1s;
}
.field-row:hover { background: #1e2138; }
.field-row.active { background: #1e2545; }
.fr-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.fr-name { font-size: 11px; font-weight: 600; color: #c8cce8; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fr-coords { font-size: 9.5px; color: #4a5070; font-family: monospace; white-space: nowrap; }
.fr-del { background: none; border: none; color: #883333; cursor: pointer; font-size: 12px; padding: 1px 4px; border-radius: 4px; font-family: inherit; line-height: 1; opacity: 0; transition: opacity .12s; }
.field-row:hover .fr-del { opacity: 1; }
.fr-del:hover { background: #3a1010; color: #ff6666; }

#detail { padding: 12px; border-top: 1px solid #2a2d42; background: #0d0f1a; flex-shrink: 0; }
#detail h3 { font-size: 11.5px; font-weight: 700; color: #fff; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
.det-row { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.det-label { font-size: 10px; color: #7a8099; width: 36px; flex-shrink: 0; }
.det-input { flex: 1; background: #1e2138; border: 1px solid #2e3250; border-radius: 6px; color: #c8cce8; font-size: 12px; font-family: monospace; padding: 4px 8px; outline: none; }
.det-input:focus { border-color: #4466cc; }
#code-out { margin-top: 8px; background: #070810; border: 1px solid #2a2d42; border-radius: 7px; padding: 8px 10px; font-family: monospace; font-size: 10px; color: #7a9ee0; line-height: 1.7; max-height: 100px; overflow-y: auto; white-space: pre; }

#add-form { padding: 12px; display: flex; flex-direction: column; gap: 9px; overflow-y: auto; flex: 1; }
#add-form h3 { font-size: 11.5px; font-weight: 700; color: #fff; }
.click-hint { font-size: 10px; color: #4a5580; background: #0d1020; border: 1px dashed #2a2d42; border-radius: 7px; padding: 7px 9px; line-height: 1.5; text-align: center; }
.af-row { display: flex; flex-direction: column; gap: 3px; }
.af-label { font-size: 10px; color: #7a8099; text-transform: uppercase; letter-spacing: .06em; }
.af-input, .af-select { background: #1e2138; border: 1px solid #2e3250; border-radius: 7px; color: #c8cce8; font-size: 12px; font-family: inherit; padding: 6px 9px; outline: none; width: 100%; }
.af-input:focus, .af-select:focus { border-color: #4466cc; }
.af-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.color-grid { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 0; }
.color-swatch { width: 22px; height: 22px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: transform .1s; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: #fff; }
#btn-add-field { padding: 9px; border: none; border-radius: 9px; background: linear-gradient(135deg,#1a4a8a,#2255bb); color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; transition: filter .14s; }
#btn-add-field:hover { filter: brightness(1.15); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🎯 PDF Field Positioner</h1>
  <div class="tb-sep"></div>
  <label style="font-size:11px;color:#8a8fb0">PDF:</label>

    <option value="preventivo">Modulo_energia_preventivo.pdf</option>

  </select>
  <div class="tb-sep"></div>
  <label style="font-size:11px;color:#8a8fb0">Zoom:</label>
  <select id="sel-zoom">
    <option value="0.75">75%</option>
    <option value="1">100%</option>
    <option value="1.5" selected>150%</option>
    <option value="2">200%</option>
  </select>
  <div class="tb-sep"></div>
  <button id="btn-copy">📋 Copia JS</button>
  <button id="btn-export">💾 Esporta JSON</button>
  <button id="btn-reset">↩ Reset</button>
  <span id="status">Caricamento…</span>
</div>

<div id="main">
  <div id="canvas-wrap">
    <div id="pdf-container">
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-tabs">
      <button class="stab active" data-tab="fields">📍 Campi</button>
      <button class="stab" data-tab="add">➕ Aggiungi</button>
    </div>

    <div id="tab-fields" class="active">
      <input id="field-search" type="text" placeholder="🔍 Cerca campo…">
      <div id="field-list"></div>
      <div id="detail" style="display:none">
        <h3 id="det-title">Campo</h3>
        <div class="det-row"><span class="det-label">Label</span><input class="det-input" id="inp-label" type="text"></div>
        <div class="det-row"><span class="det-label">X</span><input class="det-input" id="inp-x" type="number"></div>
        <div class="det-row"><span class="det-label">top</span><input class="det-input" id="inp-y" type="number"></div>
        <div class="det-row">
          <span class="det-label">Tipo</span>
          <select class="det-input" id="inp-type">
            <option value="text">text — T()</option>
            <option value="cells">cells — CL()</option>
            <option value="check">check — CK()</option>
          </select>
        </div>
        <div id="code-out"></div>
      </div>
    </div>

    <div id="tab-add">
      <div id="add-form">
        <h3>Nuovo campo</h3>
        <div class="click-hint">💡 Clicca sul PDF per impostare le coordinate, poi compila qui e premi Aggiungi</div>
        <div class="af-row"><div class="af-label">Key (d.???)</div><input class="af-input" id="new-key" placeholder="es: nome_campo" autocomplete="off"></div>
        <div class="af-row"><div class="af-label">Etichetta visiva</div><input class="af-input" id="new-label" placeholder="es: Nome Cognome" autocomplete="off"></div>
        <div class="af-row">
          <div class="af-label">Tipo</div>
          <select class="af-select" id="new-type">
            <option value="text">text — T(d.key, x, top, SZ)</option>
            <option value="cells">cells — CL(d.key, x, top, cw, n)</option>
            <option value="check">check — CK(condition, x, top)</option>
          </select>
        </div>
        <div class="af-row-2">
          <div class="af-row"><div class="af-label">X</div><input class="af-input" id="new-x" type="number" value="100"></div>
          <div class="af-row"><div class="af-label">top</div><input class="af-input" id="new-top" type="number" value="100"></div>
        </div>
        <div class="af-row"><div class="af-label">Colore</div><div class="color-grid" id="color-grid"></div></div>
        <button id="btn-add-field">➕ Aggiungi Campo</button>
      </div>
    </div>
  </div>
</div>

const customFields = { preventivo: [], multisito: [] };
const overrides    = {};
let currentPdf = "preventivo", scale = 1.5, selectedKey = null, pdfDoc = null;

function allFields(p) { return [...BASE_FIELDS[p], ...customFields[p]]; }
function findField(p, k) { return allFields(p).find(f => f.key === k); }
function getPos(k) {
  const f = findField(currentPdf, k); if (!f) return {x:0,top:0};
  const ov = overrides[currentPdf+"."+k];
  return ov ? {x:ov.x, top:ov.top} : {x:f.x, top:f.top};
}
function setPos(k,x,t) { overrides[currentPdf+"."+k] = {x:Math.round(x), top:Math.round(t)}; }
function pdfX(x)   { return x*scale; }
function pdfT(t)   { return t*scale; }
function canX(cx)  { return cx/scale; }
function canT(cy)  { return cy/scale; }

const PDF_FILES = { preventivo:"Modulo_energia_preventivo.pdf", multisito:"Modulo_energia_multisito.pdf" };

async function loadPDF(type) {
  status("Caricamento PDF…");
  try {
    pdfDoc = await pdfjsLib.getDocument(PDF_FILES[type]).promise;
    await renderPage();
  } catch(e) { pdfDoc=null; renderFallback(); }
}
async function renderPage() {
  if (!pdfDoc) return renderFallback();
  const page = await pdfDoc.getPage(1);
  const vp   = page.getViewport({scale});
  const c    = document.getElementById("pdf-canvas");
  c.width=vp.width; c.height=vp.height;
  await page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise;
  status(`${allFields(currentPdf).length} campi — trascina i pin o clicca sul PDF per aggiungerne`);
  rebuildPins();
}
function renderFallback() {
  const c=document.getElementById("pdf-canvas");
  c.width=Math.round(595*scale); c.height=Math.round(841*scale);
  const ctx=c.getContext("2d");
  ctx.fillStyle="#2a2d3a"; ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#666"; ctx.font=`${13*scale}px sans-serif`; ctx.textAlign="center";
  ctx.fillText("⚠ PDF non raggiungibile in file:// — usa un web server",c.width/2,c.height/2-30*scale);
  ctx.font=`${10*scale}px monospace`; ctx.fillStyle="#888";
  ctx.fillText("python3 -m http.server 8000",c.width/2,c.height/2+10*scale);
  status("⚠ PDF non caricato — i pin sono comunque spostabili"); rebuildPins();
}

function rebuildPins() {
  document.querySelectorAll(".field-pin").forEach(p=>p.remove());
  const C=document.getElementById("pdf-container");
  allFields(currentPdf).forEach(f=>createPin(f,C));
  buildSidebar();
}
function createPin(f,C) {
  C=C||document.getElementById("pdf-container");
  const pos=getPos(f.key);
  const pin=document.createElement("div");
  pin.className="field-pin"+(f.key===selectedKey?" selected":"");
  pin.id="pin-"+f.key; pin.dataset.key=f.key;
  pin.style.left=pdfX(pos.x)+"px"; pin.style.top=pdfT(pos.top)+"px";
  pin.innerHTML=`<div class="pin-crossh"></div><div class="pin-crossv"></div><div class="pin-dot" style="background:${f.color}"></div><div class="pin-label" style="color:${f.color}">${f.label}</div>`;
  makeDraggable(pin,f.key);
  pin.addEventListener("click",e=>{e.stopPropagation();selectField(f.key);});
  C.appendChild(pin);
}
function makeDraggable(el,key) {
  let sx,sy,sl,st;
  el.addEventListener("mousedown",e=>{
    e.preventDefault(); selectField(key);
    sx=e.clientX; sy=e.clientY; sl=parseFloat(el.style.left); st=parseFloat(el.style.top);
    const mv=e=>{
      const nl=Math.max(0,sl+e.clientX-sx), nt=Math.max(0,st+e.clientY-sy);
      el.style.left=nl+"px"; el.style.top=nt+"px";
      setPos(key,canX(nl),canT(nt)); updateDetail(key); updateSidebarRow(key);
    };
    const up=()=>{ document.removeEventListener("mousemove",mv); document.removeEventListener("mouseup",up); };
    document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
  });
}

// Click-to-place
document.getElementById("pdf-container").addEventListener("click",e=>{
  if(e.target.closest(".field-pin")) return;
  const rect=document.getElementById("pdf-canvas").getBoundingClientRect();
  const px=Math.round(canX(e.clientX-rect.left)), pt=Math.round(canT(e.clientY-rect.top));
  document.getElementById("new-x").value=px;
  document.getElementById("new-top").value=pt;
  switchTab("add");
  document.getElementById("new-key").focus();
  status(`📍 Click a x:${px} top:${pt} — compila il form e aggiungi`);
});

function selectField(key) {
  selectedKey=key;
  document.querySelectorAll(".field-pin").forEach(p=>p.classList.remove("selected"));
  const pin=document.getElementById("pin-"+key); if(pin) pin.classList.add("selected");
  document.querySelectorAll(".field-row").forEach(r=>r.classList.remove("active"));
  const row=document.querySelector(`.field-row[data-key="${key}"]`);
  if(row){row.classList.add("active");row.scrollIntoView({block:"nearest"});}
  updateDetail(key); switchTab("fields");
}

function updateDetail(key) {
  const f=findField(currentPdf,key); if(!f) return;
  const pos=getPos(key);
  document.getElementById("detail").style.display="block";
  document.getElementById("det-title").innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${f.color};margin-right:5px"></span>${f.label}`;
  document.getElementById("inp-label").value=f.label;
  document.getElementById("inp-x").value=pos.x;
  document.getElementById("inp-y").value=pos.top;
  document.getElementById("inp-type").value=f.type;
  document.getElementById("code-out").textContent=codeFor(key);
}
function codeFor(key) {
  const f=findField(currentPdf,key); const pos=getPos(key); if(!f) return "";
  if(f.type==="check") return `CK(condition, ${pos.x}, ${pos.top});`;
  if(f.type==="cells") return `CL(d.${f.key}, ${pos.x}, ${pos.top}, cw, n);`;
  return `T(d.${f.key}, ${pos.x}, ${pos.top}, SZ);`;
}
function updateSidebarRow(key) {
  const pos=getPos(key);
  const el=document.querySelector(`.field-row[data-key="${key}"] .fr-coords`);
  if(el) el.textContent=`x:${pos.x} t:${pos.top}`;
}

document.getElementById("inp-label").addEventListener("input",e=>{
  if(!selectedKey) return;
  const f=findField(currentPdf,selectedKey); if(f) f.label=e.target.value;
  const pin=document.getElementById("pin-"+selectedKey);
  if(pin){const l=pin.querySelector(".pin-label");if(l) l.textContent=e.target.value;}
  buildSidebar(); updateDetail(selectedKey);
});
document.getElementById("inp-x").addEventListener("input",e=>{
  if(!selectedKey) return;
  const v=parseFloat(e.target.value)||0, pos=getPos(selectedKey);
  setPos(selectedKey,v,pos.top);
  const pin=document.getElementById("pin-"+selectedKey); if(pin) pin.style.left=pdfX(v)+"px";
  document.getElementById("code-out").textContent=codeFor(selectedKey); updateSidebarRow(selectedKey);
});
document.getElementById("inp-y").addEventListener("input",e=>{
  if(!selectedKey) return;
  const v=parseFloat(e.target.value)||0, pos=getPos(selectedKey);
  setPos(selectedKey,pos.x,v);
  const pin=document.getElementById("pin-"+selectedKey); if(pin) pin.style.top=pdfT(v)+"px";
  document.getElementById("code-out").textContent=codeFor(selectedKey); updateSidebarRow(selectedKey);
});
document.getElementById("inp-type").addEventListener("change",e=>{
  if(!selectedKey) return;
  const f=findField(currentPdf,selectedKey); if(f) f.type=e.target.value;
  document.getElementById("code-out").textContent=codeFor(selectedKey);
});

function buildSidebar(filter) {
  const list=document.getElementById("field-list"); list.innerHTML="";
  const q=(filter||"").toLowerCase();
  allFields(currentPdf).forEach(f=>{
    if(q&&!f.label.toLowerCase().includes(q)&&!f.key.toLowerCase().includes(q)) return;
    const pos=getPos(f.key);
    const row=document.createElement("div");
    row.className="field-row"+(f.key===selectedKey?" active":""); row.dataset.key=f.key;
    const isCustom=customFields[currentPdf].some(c=>c.key===f.key);
    row.innerHTML=`<div class="fr-dot" style="background:${f.color}"></div><div class="fr-name">${f.label}</div><div class="fr-coords">x:${pos.x} t:${pos.top}</div>${isCustom?`<button class="fr-del" data-del="${f.key}">✕</button>`:""}`;
    row.addEventListener("click",e=>{
      if(e.target.dataset.del) return;
      selectField(f.key);
      const pin=document.getElementById("pin-"+f.key); if(pin) pin.scrollIntoView({block:"center",behavior:"smooth"});
    });
    const del=row.querySelector("[data-del]");
    if(del) del.addEventListener("click",e=>{ e.stopPropagation(); deleteField(f.key); });
    list.appendChild(row);
  });
}
document.getElementById("field-search").addEventListener("input",e=>buildSidebar(e.target.value));

// Color palette
const colorGrid=document.getElementById("color-grid");
PALETTE.forEach(c=>{
  const sw=document.createElement("div");
  sw.className="color-swatch"+(c===newFieldColor?" selected":""); sw.style.background=c; sw.title=c;
  sw.addEventListener("click",()=>{ newFieldColor=c; document.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("selected")); sw.classList.add("selected"); });
  colorGrid.appendChild(sw);
});

document.getElementById("btn-add-field").addEventListener("click",()=>{
  const key=document.getElementById("new-key").value.trim().replace(/\s+/g,"_");
  const label=document.getElementById("new-label").value.trim();
  const type=document.getElementById("new-type").value;
  const x=parseInt(document.getElementById("new-x").value)||100;
  const top=parseInt(document.getElementById("new-top").value)||100;
  if(!key){alert("Inserisci una key."); return;}
  if(!label){alert("Inserisci un'etichetta."); return;}
  if(findField(currentPdf,key)){alert(`Key "${key}" già esistente.`); return;}
  const nf={key,label,x,top,color:newFieldColor,type};
  customFields[currentPdf].push(nf); setPos(key,x,top);
  createPin(nf); buildSidebar(); selectField(key);
  document.getElementById("new-key").value=""; document.getElementById("new-label").value="";
  switchTab("fields"); status(`✅ Campo "${label}" aggiunto`);
});

function deleteField(key) {
  const idx=customFields[currentPdf].findIndex(f=>f.key===key); if(idx===-1) return;
  customFields[currentPdf].splice(idx,1); delete overrides[currentPdf+"."+key];
  const pin=document.getElementById("pin-"+key); if(pin) pin.remove();
  if(selectedKey===key){ selectedKey=null; document.getElementById("detail").style.display="none"; }
  buildSidebar();
}

function switchTab(tab) {
  document.querySelectorAll(".stab").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  document.getElementById("tab-fields").classList.toggle("active",tab==="fields");
  document.getElementById("tab-add").classList.toggle("active",tab==="add");
}
document.querySelectorAll(".stab").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));

document.getElementById("btn-copy").addEventListener("click",()=>{
  const fn=currentPdf==="preventivo"?"_fillPreventivo":"_fillMultisito";
  const lines=[`// ── Coordinate aggiornate — ${currentPdf} ──`,`// Copia in ${fn}()`,""];
  allFields(currentPdf).forEach(f=>{lines.push(`// ${f.label}`); lines.push(codeFor(f.key));});
  navigator.clipboard.writeText(lines.join("\n")).then(()=>{
    const b=document.getElementById("btn-copy"); b.textContent="✅ Copiato!";
    setTimeout(()=>b.textContent="📋 Copia JS",2000);
  });
});

document.getElementById("btn-export").addEventListener("click",()=>{
  const data={overrides, custom_preventivo:customFields.preventivo, custom_multisito:customFields.multisito};
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
  a.download="pdf-field-positions.json"; a.click();
});

document.getElementById("btn-reset").addEventListener("click",()=>{
  if(!confirm("Reset coordinate modificate?")) return;
  Object.keys(overrides).forEach(k=>{ if(k.startsWith(currentPdf+".")) delete overrides[k]; });
  rebuildPins(); document.getElementById("detail").style.display="none"; selectedKey=null;
  status("Coordinate resettate");
});

document.getElementById("sel-pdf").addEventListener("change",async e=>{
  currentPdf=e.target.value; selectedKey=null;
  document.getElementById("detail").style.display="none";
  document.getElementById("field-search").value="";
  await loadPDF(currentPdf);
});
document.getElementById("sel-zoom").addEventListener("change",async e=>{
  scale=parseFloat(e.target.value);
  if(pdfDoc) await renderPage(); else renderFallback();
});

function status(msg) { document.getElementById("status").textContent=msg; }
loadPDF(currentPdf);
</script>
